# Development compose - extends base configuration
# Usage: docker compose -f docker-compose.base.yml -f docker-compose.dev.yml up

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      - DEBUG=true
      - ENVIRONMENT=development
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://fluent:fluent@db:5432/fluent_ai}
    volumes:
      - ./src:/app/src:cached
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./uv.lock:/app/uv.lock:ro
    depends_on:
      db:
        condition: service_healthy
        required: false

  db:
    image: postgres:16-alpine
    profiles:
      - local-db
    environment:
      - POSTGRES_USER=fluent
      - POSTGRES_PASSWORD=fluent
      - POSTGRES_DB=fluent_ai
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluent -d fluent_ai"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fluent-network

volumes:
  postgres_data_dev:
