# alembic.ini — placeholder
#
# Alembic is the standard migration tool for SQLAlchemy projects.
#
# IMPORTANT: This service owns ONLY the ai schema. Alembic must be configured
# to never generate or apply migrations against the public schema (owned by
# fluent-server) or any other schema this service does not own.
#
# To initialize Alembic for real:
#   uv add alembic
#   uv run alembic init src/app/db/migrations
#
# Then edit src/app/db/migrations/env.py to:
#   1. Import OwnedBase from app.db.base (NOT ExternalBase)
#   2. Set target_metadata = OwnedBase.metadata
#   3. Load the database URL from app.config.get_settings().async_database_url
#   4. Add an include_name filter to lock migrations to the ai schema only:
#
#      def include_name(name, type_, parent_names):
#          if type_ == "schema":
#              return name == "ai"
#          return True
#
#      context.configure(
#          ...
#          include_schemas=True,
#          include_name=include_name,
#          version_table_schema="ai",  # store alembic_version in ai schema
#      )
#
# Common commands:
#   uv run alembic revision --autogenerate -m "add api_keys table"
#   uv run alembic upgrade head
#   uv run alembic downgrade -1
#   uv run alembic history
