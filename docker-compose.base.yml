# Base compose configuration - shared across environments
services:
  app:
    environment:
      - APP_NAME=${APP_NAME:-Fluent AI API}
      - APP_VERSION=${APP_VERSION:-0.1.0}
      - HOST=0.0.0.0
      - PORT=8200
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    ports:
      - "${PORT:-8200}:8200"
    restart: unless-stopped
    networks:
      - fluent-network

networks:
  fluent-network:
    driver: bridge
