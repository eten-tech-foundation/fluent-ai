services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fluent
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - fluent-pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fluent"]
      interval: 5s
      timeout: 5s
      retries: 5

  ai:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "${PORT:-8200}:8200"
    volumes:
      - ./src:/app/src:cached
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./uv.lock:/app/uv.lock:ro
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@db:5432/fluent"
      ENVIRONMENT: development
      DEBUG: "true"
    command: sh docker-entrypoint.sh
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8200/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  fluent-pgdata:
